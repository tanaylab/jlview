on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'devel'}
          - {os: macos-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      JULIA_NUM_THREADS: 2
      NOT_CRAN: true
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        id: setup-r
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'

      - name: Cache Julia packages
        uses: actions/cache@v5
        with:
          path: ~/.julia
          key: ${{ runner.os }}-R${{ steps.setup-r.outputs.installed-r-version }}-julia-${{ hashFiles('**/Project.toml') }}-${{ hashFiles('**/Manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-R${{ steps.setup-r.outputs.installed-r-version }}-julia-

      - name: Set R_HOME and configure RCall
        run: |
          R_HOME_PATH=$(Rscript -e 'cat(R.home())')
          echo "R_HOME=${R_HOME_PATH}" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=${R_HOME_PATH}/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV
          echo "JULIA_COPY_STACKS=1" >> $GITHUB_ENV

      - name: Install required Julia packages
        run: |
          julia -e '
          ENV["R_HOME"] = ENV["R_HOME"]
          using Pkg
          Pkg.add("Suppressor")
          Pkg.add("RCall")
          Pkg.add("NamedArrays")
          Pkg.add("SparseArrays")
          Pkg.build("RCall")
          Pkg.precompile()
          '

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::JuliaCall, any::Matrix, any::testthat
          needs: check

      - name: Run R CMD check (without tests)
        env:
          _R_CHECK_CRAN_INCOMING_REMOTE_: false
          _R_CHECK_FORCE_SUGGESTS_: false
        run: |
          options(crayon.enabled = TRUE)
          rcmdcheck::rcmdcheck(
            args = c("--no-manual", "--no-tests", "--no-multiarch"),
            error_on = "error",
            check_dir = "check"
          )
        shell: Rscript {0}

      - name: Install jlview
        run: R CMD INSTALL .

      - name: Run testthat tests
        if: runner.os == 'macOS'
        run: |
          Rscript -e '
          library(testthat)
          library(jlview)

          tryCatch({
            JuliaCall::julia_setup()
            jlview:::jlview_ensure_init()
          }, error = function(e) {
            message("Julia initialization failed: ", e$message)
            quit(status = 1)
          })

          results <- test_dir("tests/testthat", reporter = "summary")
          if (any(as.data.frame(results)$failed > 0)) {
            quit(status = 1)
          }
          '

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.os }}-r${{ matrix.config.r }}-results
          path: check
